services:
  service:
    build:
      context: .
      dockerfile: src/BackendTest.Host/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Sqlite: "Data Source=/tmp/database.db"
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -T 5 --spider http://localhost:8080/health/liveness || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
